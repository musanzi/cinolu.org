@let item = opportunity();
<section class="grid grid-cols-1 gap-6 xl:grid-cols-[1.1fr_0.9fr]">
  <article class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
    <div class="mb-5 flex items-center justify-between gap-3 border-b border-gray-100 pb-4">
      <div>
        <h3 class="text-xl font-semibold text-gray-900">{{ item.title }}</h3>
      </div>
      <app-ui-badge [label]="item.language === 'fr' ? 'Français' : 'English'" [variant]="'info'" />
    </div>

    <div class="space-y-5">
      <div class="grid grid-cols-1 gap-4">
        <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
          <div class="mb-2 inline-flex items-center gap-2 text-sm font-semibold text-gray-700">
            <i-lucide [name]="icons.Calendar" class="size-4" />
            Date limite
          </div>
          <p class="text-sm text-gray-600">{{ item.due_date | date: 'longDate' }}</p>
        </div>
        <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
          <a
            [href]="item.link"
            target="_blank"
            rel="noopener noreferrer"
            class="mb-2 inline-flex items-center gap-1 text-sm text-primary-700 underline">
            <i-lucide [name]="icons.ExternalLink" class="size-4" />
            Lien de l'offre
          </a>
        </div>
      </div>

      <div>
        <div class="mb-2 inline-flex items-center gap-2 text-sm font-semibold text-gray-700">
          <i-lucide [name]="icons.FileText" class="size-4" />
          Description
        </div>
        <p class="whitespace-pre-line text-sm leading-7 text-gray-700">{{ item.description }}</p>
      </div>
    </div>
  </article>

  <aside>
    <div class="mb-5 flex items-center gap-2 border-b border-gray-100 pb-4">
      <i-lucide [name]="icons.Image" class="size-4 text-gray-500" />
      <h3 class="text-base font-semibold text-gray-900">Image de couverture</h3>
    </div>
    <div
      class="relative flex min-h-72 items-center justify-center overflow-hidden rounded-2xl border border-dashed border-gray-300 bg-gray-50">
      @if (item.cover) {
        <img [src]="item | apiIMG: 'opportunity'" [alt]="item.title" class="h-full w-full object-cover" />
      } @else {
        <div class="px-6 text-center text-sm text-gray-500">Aucune image de couverture n'a encore été ajoutée.</div>
      }
    </div>
  </aside>
</section>
