@let item = opportunity();
<section class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm md:p-7">
  <div class="mb-6 flex items-center gap-2 border-b border-gray-100 pb-4">
    <i-lucide [name]="icons.Image" class="size-4 text-gray-500" />
    <div>
      <h3 class="text-lg font-semibold text-gray-900">Gérer la couverture</h3>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-[0.95fr_1.05fr]">
    <div
      class="relative flex min-h-72 items-center justify-center overflow-hidden rounded-2xl border border-dashed border-gray-300 bg-gray-50">
      @if (item.cover) {
        <img [src]="item | apiIMG: 'opportunity'" [alt]="item.title" class="h-full w-full object-cover" />
      } @else {
        <div class="px-6 text-center text-sm text-gray-500">Aucune image disponible pour le moment.</div>
      }
    </div>

    <div class="flex flex-col justify-center">
      @if (isLoading()) {
        <div class="h-20 w-full animate-pulse rounded-xl bg-gray-200"></div>
      } @else {
        <div class="max-w-md">
          <app-ui-file-upload
            [name]="'cover'"
            [method]="item.cover ? 'PATCH' : 'POST'"
            [url]="'opportunities/id/' + item.id + '/cover'"
            (loaded)="onCoverUploaded()" />
        </div>
      }
    </div>
  </div>
</section>
