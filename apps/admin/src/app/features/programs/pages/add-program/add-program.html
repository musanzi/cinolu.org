<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <form class="p-6 space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <app-ui-select
        [id]="'category'"
        label="Catégorie"
        [optionLabel]="'name'"
        [optionValue]="'id'"
        [options]="categoriesStore.allCategories()"
        formControlName="category"
        placeholder="Sélectionner une catégorie" />
      <app-ui-select
        [id]="'sector'"
        label="Secteur"
        [optionLabel]="'name'"
        [optionValue]="'id'"
        [options]="sectorsStore.sectors()"
        [allowCreate]="true"
        [createDisabled]="sectorsStore.isLoading()"
        createPlaceholder="Ajouter un secteur"
        createButtonLabel="Ajouter"
        formControlName="sector"
        placeholder="Sélectionner un secteur"
        (createOption)="onCreateSector($event)" />
      <app-ui-input
        [id]="'name'"
        label="Nom du programme"
        formControlName="name"
        placeholder="Ex: Programme d'Innovation" />
    </div>
    <app-ui-textarea
      [id]="'description'"
      label="Description"
      formControlName="description"
      placeholder="Décrivez le programme en détail..." />

    <div class="flex items-end justify-end pt-4 border-t border-gray-100">
      <app-ui-button
        type="submit"
        size="small"
        [disabled]="form.invalid || store.isLoading()"
        [loading]="store.isLoading()"
        variant="primary">
        Créer le programme
      </app-ui-button>
    </div>
  </form>
</div>
