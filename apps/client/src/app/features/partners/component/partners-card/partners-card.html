<div
  class="rounded-2xl border border-gray-200 bg-white p-5 transition-colors duration-200 hover:border-primary-300 md:p-6">
  <div class="flex items-center gap-4">
    <div class="flex h-[4.5rem] w-[4.5rem] shrink-0 items-center justify-center overflow-hidden rounded-xl border border-gray-200 bg-gray-50">
      @if (partner()?.image) {
      <img
        [src]="partner()?.image"
        [alt]="'logo de ' + (partner()?.name || '')"
        class="h-12 w-full object-contain"
        loading="lazy" />
      } @else {
      <div class="h-10 w-10 rounded-lg bg-gray-100"></div>
      }
    </div>

    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-semibold text-gray-900">{{ partner()?.name }}</p>
      @if (partner()?.category) {
      <span
        class="mt-2 inline-flex items-center rounded-full border border-primary-200 bg-primary-50 px-2 py-0.5 text-xs font-medium text-primary-700">
        {{ partner()?.category }}
      </span>
      }
    </div>
  </div>
</div>
