<div class="tailadmin-card">
  <div class="flex flex-col md:flex-row gap-4 items-start md:items-end">
    <!-- Catégorie Dropdown -->
    <div class="flex-1 min-w-0">
      <label for="category-filter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
        Catégorie
      </label>
      <select
        id="category-filter"
        [value]="selectedCategory() ?? ''"
        (change)="onCategoryChangeFromEvent($event)"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors">
        <option value="">Toutes les catégories</option>
        @for (cat of categories; track cat.value) {
        <option [value]="cat.value">{{ cat.label }}</option>
        }
      </select>
    </div>

    <!-- Reset Button -->
    <button
      type="button"
      (click)="resetFilters()"
      class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg transition-colors whitespace-nowrap">
      <i-lucide [name]="icons.clear" [size]="16" />
      <span>Réinitialiser</span>
    </button>
  </div>
</div>
