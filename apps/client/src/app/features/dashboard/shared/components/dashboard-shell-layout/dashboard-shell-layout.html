<div class="dashboard-shell font-outfit min-h-screen bg-gray-50 safe-area-dashboard xl:flex">
  <div>
    <ng-content select="[dashboard-sidebar]" />
    <app-dashboard-backdrop />
  </div>

  <div
    class="flex-1 transition-all duration-300 ease-in-out"
    [ngClass]="{
      'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[90px]': (isExpanded$ | async) === false && (isHovered$ | async) === false
    }">
    <ng-content select="[dashboard-header]" />
    <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
      <router-outlet />
    </div>
  </div>
</div>

<app-back-button />
