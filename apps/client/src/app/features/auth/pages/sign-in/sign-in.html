<app-auth-card [title]="'auth.signin.title' | translate" [description]="'auth.signin.description' | translate">
  <ui-auth-panel variant="minimal">
    <p class="mb-8 text-sm text-gray-500 dark:text-gray-400">
      {{ 'auth.signin.noAccount' | translate }}
      <a class="font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-400" [routerLink]="['/sign-up']">
        {{ 'auth.signin.signUpLink' | translate }}
      </a>
    </p>

    <form [formGroup]="form" class="space-y-6" (ngSubmit)="onSignIn()">
      <ui-textfield
        inputId="signin-email"
        formControlName="email"
        type="email"
        [label]="'auth.signin.form.email' | translate"
        [placeholder]="'auth.signin.form.emailPlaceholder' | translate" />

      <ui-password-field
        inputId="signin-password"
        formControlName="password"
        [label]="'auth.signin.form.password' | translate"
        [placeholder]="'auth.signin.form.passwordPlaceholder' | translate" />

      <div class="flex items-center justify-between text-sm">
        <span class="text-gray-500 dark:text-gray-400">{{ 'auth.signin.forgotPassword' | translate }}</span>
        <a class="font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-400" [routerLink]="['/forgot-password']">
          {{ 'auth.signin.resetLink' | translate }}
        </a>
      </div>

      <ui-button
        type="submit"
        [fullWidth]="true"
        [loading]="store.isLoading()"
        [disabled]="store.isLoading() || form.invalid">
        {{ 'auth.signin.form.submit' | translate }}
      </ui-button>

      <div class="flex items-center gap-3">
        <div class="h-px flex-1 bg-gray-200 dark:bg-gray-800"></div>
        <span class="text-sm text-gray-500 dark:text-gray-400">{{ 'auth.signin.orContinueWith' | translate }}</span>
        <div class="h-px flex-1 bg-gray-200 dark:bg-gray-800"></div>
      </div>

      <ui-button variant="outline" type="button" [fullWidth]="true" (click)="signinWithGoogle()">
        <div class="relative h-5 w-5">
          <img ngSrc="/images/google.svg" alt="Google" fill />
        </div>
        <span>Google</span>
      </ui-button>
    </form>
  </ui-auth-panel>
</app-auth-card>
