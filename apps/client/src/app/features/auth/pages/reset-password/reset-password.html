<app-auth-card
  [title]="'auth.resetPassword.title' | translate"
  [description]="'auth.resetPassword.description' | translate">
  <ui-auth-panel>
    <p class="mb-6 text-sm text-gray-500 dark:text-gray-400">
      {{ 'auth.resetPassword.noAccount' | translate }}
      <a class="font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-400" [routerLink]="['/sign-in']">
        {{ 'auth.resetPassword.signInLink' | translate }}
      </a>
    </p>
    <p class="mb-6 text-sm text-gray-500 dark:text-gray-400">{{ 'auth.resetPassword.instruction' | translate }}</p>

    <form [formGroup]="form" class="space-y-5" (ngSubmit)="onResetPassword()">
      <ui-password-field
        inputId="reset-password"
        formControlName="password"
        [label]="'auth.resetPassword.form.password' | translate"
        [placeholder]="'auth.resetPassword.form.passwordPlaceholder' | translate"
        [error]="
          form.get('password')?.invalid && form.get('password')?.touched
            ? ('auth.resetPassword.errors.passwordRequired' | translate)
            : ''
        " />

      <ui-password-field
        inputId="reset-password-confirm"
        formControlName="password_confirm"
        [label]="'auth.resetPassword.form.passwordConfirm' | translate"
        [placeholder]="'auth.resetPassword.form.passwordConfirmPlaceholder' | translate"
        [error]="
          form.get('password_confirm')?.invalid && form.get('password_confirm')?.touched
            ? ('auth.resetPassword.errors.passwordConfirmRequired' | translate)
            : ''
        " />

      <ui-button
        type="submit"
        [fullWidth]="true"
        [loading]="store.isLoading()"
        [disabled]="store.isLoading() || form.invalid">
        {{ 'auth.resetPassword.form.submit' | translate }}
      </ui-button>
    </form>
  </ui-auth-panel>
</app-auth-card>
