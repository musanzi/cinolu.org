<div class="public-site flex min-h-screen items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-2xl text-center">
    <div class="relative mb-8">
      <h1 class="font-black leading-none text-brand-600 text-[150px] md:text-[200px]">404</h1>
    </div>

    <div class="mb-6 flex justify-center">
      <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand-50">
        <lucide-angular [img]="icons.searchX" class="h-10 w-10 text-brand-600" [strokeWidth]="2" />
      </div>
    </div>

    <h2 class="mb-4 text-3xl font-bold text-gray-900 md:text-4xl">Page introuvable</h2>
    <p class="mx-auto mb-8 max-w-md text-lg text-gray-600">
      Désolé, la page que vous recherchez n'existe pas ou a été déplacée.
    </p>

    <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
      <button
        (click)="goBack()"
        class="inline-flex items-center gap-2 rounded-lg border-2 border-brand-200 bg-white px-6 py-3 font-semibold text-brand-700 transition-colors duration-200 hover:border-brand-300 hover:bg-brand-50">
        <lucide-angular [img]="icons.arrowLeft" class="h-5 w-5" [strokeWidth]="2" />
        <span>Retour</span>
      </button>

      <a
        routerLink="/"
        class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-6 py-3 font-semibold text-white transition-colors duration-200 hover:bg-brand-700">
        <lucide-angular [img]="icons.home" class="h-5 w-5" [strokeWidth]="2" />
        <span>Accueil</span>
      </a>
    </div>

    <div class="mx-auto mt-16 grid max-w-sm grid-cols-3 gap-4 opacity-50">
      <div class="h-2 rounded-full bg-brand-200"></div>
      <div class="h-2 rounded-full bg-brand-400"></div>
      <div class="h-2 rounded-full bg-brand-200"></div>
    </div>
  </div>
</div>
