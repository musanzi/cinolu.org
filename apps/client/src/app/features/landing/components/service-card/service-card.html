@if (service(); as item) {
<div class="group relative flex flex-col items-center text-center">
  <div
    class="absolute -top-4 left-1/2 z-10 flex h-12 w-12 -translate-x-1/2 items-center justify-center rounded-full bg-brand-600 text-lg font-bold text-white">
    {{ item.id }}
  </div>

  <div
    class="public-card-hover w-full px-5 pb-5 pt-12 transition-colors duration-200 hover:border-brand-300 md:px-6 md:pb-6 md:pt-12">
    <div class="mb-4 flex justify-center">
      <div class="public-icon-well-muted h-16 w-16 transition-colors duration-200">
        <i-lucide [name]="item.icon" class="h-8 w-8 stroke-[2]" />
      </div>
    </div>

    <h3 class="mb-3 text-lg font-bold leading-tight text-gray-900 sm:text-xl">
      {{ titleKey() | translate }}
    </h3>

    <p class="text-sm leading-relaxed text-gray-600 sm:text-[15px]">{{ descriptionKey() | translate }}</p>
  </div>

  @if (item.id < 4) { @if ((item.id === 1) || (item.id === 2)) {
  <div class="absolute top-8 left-[60%] hidden h-0.5 w-[80%] bg-brand-200 lg:block 3xl:hidden"></div>
  } @if ((item.id === 1) || (item.id === 2) || (item.id === 3)) {
  <div class="absolute top-8 left-[60%] hidden h-0.5 w-[80%] bg-brand-200 3xl:block"></div>
  } @if (item.id === 3) {
  <div class="absolute top-8 left-[60%] hidden h-24 w-[140%] overflow-visible lg:block 3xl:hidden">
    <svg viewBox="0 0 140 96" class="h-full w-full">
      <path
        d="M 0 4 Q 40 4 70 30 Q 100 56 140 80 100 104 70 130 Q 40 156 0 156"
        stroke="rgb(147 197 253)"
        stroke-width="8"
        fill="none"
        opacity="0.3"
        stroke-dasharray="4,4" />
    </svg>
  </div>
  } }
</div>
}
