<div
  class="group relative flex min-h-[120px] w-[160px] shrink-0 flex-col rounded-2xl border border-gray-200 bg-white p-5 transition-colors duration-200 hover:border-primary-300 sm:min-h-[140px] sm:w-[180px] md:min-h-[160px] md:w-[200px] md:p-6 lg:w-[220px]">
  <div class="absolute top-3 right-3 z-[1]">
    <span
      class="inline-flex items-center rounded-full border border-primary-200 bg-primary-50 px-2 py-0.5 text-xs font-medium text-primary-700">
      {{ partner.category }}
    </span>
  </div>

  <div class="mb-2 flex min-h-0 flex-1 items-center justify-center p-2 sm:mb-3 sm:p-3">
    <img
      [src]="partner.image"
      [alt]="'Logo de ' + partner.name"
      [title]="partner.name"
      loading="lazy"
      decoding="async"
      class="h-auto max-h-10 w-auto max-w-full object-contain grayscale transition-all duration-300 group-hover:grayscale-0 sm:max-h-12 md:max-h-14" />
  </div>

  <div class="border-t border-gray-100 pt-3 text-center">
    <h3 class="line-clamp-2 text-base font-bold leading-tight text-gray-900 transition-colors group-hover:text-primary-700 sm:text-lg">
      {{ partner.name }}
    </h3>
  </div>
</div>
