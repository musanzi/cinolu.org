<section class="min-h-screen bg-gray-50 flex items-center justify-center p-8">
  <div class="max-w-2xl mx-auto text-center">
    <div class="relative inline-block mb-8">
      <div class="absolute inset-0 bg-primary-200/30 rounded-full hidden animate-pulse"></div>
      <div
        class="relative w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center mx-auto  shadow-primary-200/50 border border-primary-200/50">
        <i-lucide [name]="icons.fileX" class="size-12 text-primary-600" />
      </div>
    </div>

    <h2 class="text-3xl sm:text-4xl lg:text-5xl font-black text-gray-900 mb-4 font-satoshi tracking-tight">
      {{ 'blog.not_found.title' | translate }}
    </h2>

    <p class="text-lg text-gray-600 mb-8 max-w-lg mx-auto leading-relaxed">
      {{ 'blog.not_found.message' | translate }}
    </p>

    <a routerLink="/blog-ressources">
      <ui-button size="lg">
        <span class="flex items-center gap-2">
          {{ 'blog.not_found.discover' | translate }}
          <i-lucide [name]="icons.arrowRight" class="size-4" />
        </span>
      </ui-button>
    </a>

    <div class="mt-12 grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-3xl mx-auto">
      <div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-theme-sm hover:shadow-theme-md md:p-6 transition-shadow">
        <i-lucide [name]="icons.newspaper" class="size-8 text-primary-500 mx-auto mb-3" />
        <h3 class="font-bold text-gray-900 mb-2 text-sm">Articles récents</h3>
        <p class="text-xs text-gray-600">Découvrez nos dernières publications</p>
      </div>
      <div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-theme-sm hover:shadow-theme-md md:p-6 transition-shadow">
        <i-lucide [name]="icons.tag" class="size-8 text-primary-500 mx-auto mb-3" />
        <h3 class="font-bold text-gray-900 mb-2 text-sm">Catégories</h3>
        <p class="text-xs text-gray-600">Explorez par thématique</p>
      </div>
      <div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-theme-sm hover:shadow-theme-md md:p-6 transition-shadow">
        <i-lucide [name]="icons.search" class="size-8 text-primary-500 mx-auto mb-3" />
        <h3 class="font-bold text-gray-900 mb-2 text-sm">Recherche</h3>
        <p class="text-xs text-gray-600">Trouvez ce que vous cherchez</p>
      </div>
    </div>
  </div>
</section>
