<app-public-section variant="default" className="bg-grid min-h-screen animate-pulse">
  <app-public-container className="pb-16 pt-28 lg:pt-32">
    <div class="relative mb-12">
      <div class="overflow-hidden rounded-2xl border border-gray-200 bg-white p-5 md:p-8">
        <div class="flex flex-col gap-8 lg:flex-row lg:items-center">
          <div class="relative mx-auto shrink-0 lg:mx-0">
            <div class="size-32 rounded-2xl bg-gray-200"></div>
            <div class="absolute -bottom-1 -right-1 size-6 rounded-full border-4 border-white bg-gray-300"></div>
          </div>
          <div class="flex-1 space-y-4 text-center lg:text-left">
            <div class="mx-auto h-10 max-w-sm rounded-lg bg-gray-200 lg:mx-0 lg:w-3/4"></div>
            <div class="flex flex-wrap justify-center gap-2 lg:justify-start">
              <div class="h-6 w-24 rounded-full bg-gray-100"></div>
              <div class="h-6 w-20 rounded-full bg-gray-100"></div>
            </div>
            <div class="flex justify-center gap-2 pt-2 lg:justify-start">
              <div class="size-10 rounded-xl bg-gray-100"></div>
              <div class="size-10 rounded-xl bg-gray-100"></div>
              <div class="h-10 w-36 rounded-xl bg-gray-200"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="w-full space-y-8">
      <section class="overflow-hidden rounded-2xl border border-gray-200 bg-white">
        <div class="flex items-center justify-between p-5 md:p-6">
          <div class="flex items-center gap-3">
            <div class="size-8 rounded-xl bg-gray-100"></div>
            <div class="h-6 w-32 rounded bg-gray-200"></div>
          </div>
          <div class="size-5 rounded bg-gray-100"></div>
        </div>
        <div class="px-5 pb-5 pt-0 md:px-6 md:pb-6">
          <div class="space-y-2 border-l-4 border-gray-100 pl-6">
            <div class="h-4 w-full rounded bg-gray-100"></div>
            <div class="h-4 w-5/6 rounded bg-gray-100"></div>
            <div class="h-4 w-4/5 rounded bg-gray-100"></div>
          </div>
        </div>
      </section>

      <section class="w-full">
        <div class="mb-6 flex items-center gap-3">
          <div class="size-8 rounded-xl bg-gray-100"></div>
          <div class="h-6 w-40 rounded bg-gray-200"></div>
        </div>

        <div class="space-y-6">
          <div class="overflow-hidden rounded-2xl border border-gray-200 bg-white">
            <div class="h-40 bg-gray-100"></div>
            <div class="p-5 md:p-6">
              <div class="flex items-center gap-4">
                <div class="size-16 rounded-xl bg-gray-200"></div>
                <div class="flex-1 space-y-2">
                  <div class="h-7 w-48 rounded bg-gray-200"></div>
                  <div class="flex gap-2">
                    <div class="h-6 w-16 rounded-full bg-gray-100"></div>
                    <div class="h-6 w-14 rounded-full bg-gray-100"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div class="h-36 rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
              <div class="mb-4 h-4 w-28 rounded bg-gray-200"></div>
              <div class="space-y-2">
                <div class="h-3 w-full rounded bg-gray-100"></div>
                <div class="h-3 w-5/6 rounded bg-gray-100"></div>
              </div>
            </div>

                <div class="h-3 w-full rounded bg-gray-100"></div>
                <div class="h-3 w-4/5 rounded bg-gray-100"></div>
              </div>
            </div>
          </div>

          <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
            <div class="mb-4 h-4 w-20 rounded bg-gray-200"></div>
            <div class="grid grid-cols-2 gap-3 md:grid-cols-4">
              @for (i of [1, 2, 3, 4]; track i) {
              <div class="aspect-square rounded-xl bg-gray-100"></div>
              }
            </div>
          </div>

          <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
            <div class="h-11 w-44 rounded-xl bg-gray-200"></div>
          </div>
        </div>
