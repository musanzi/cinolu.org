@if (show) {
<div class="fixed left-0 right-0 top-0 z-[999] h-1 overflow-hidden bg-primary-100">
  @if (mode === 'indeterminate') {
  <div class="h-full w-1/3 bg-primary-600 anim-shimmer"></div>
  } @else {
  <div class="h-full bg-primary-600 transition-[width] duration-200" [style.width.%]="progress"></div>
  }
</div>
}
