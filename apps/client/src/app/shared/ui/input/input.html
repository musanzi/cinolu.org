<div class="block space-y-2.5">
  @if (label()) {
  <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300" [attr.for]="inputId() || null">{{
    label()
  }}</label>
  }

  <div
    class="rounded-lg border border-gray-300 bg-white shadow-theme-xs transition-colors dark:border-gray-700 dark:bg-gray-900"
    [class.border-error-500]="!!error()"
    [class.bg-gray-100]="disabled()">
    <ng-content />
  </div>

  @if (error()) {
  <span class="block text-xs font-medium text-error-500">{{ error() }}</span>
  }
</div>
