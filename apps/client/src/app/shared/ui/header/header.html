<header class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 shadow-sm backdrop-blur-xl">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between gap-4">
      <a routerLink="/" class="flex items-center gap-2 text-xl font-bold text-gray-900">
        <span class="flex size-9 items-center justify-center rounded-lg bg-primary-600 text-white">C</span>
        <span class="hidden sm:inline">Cinolu</span>
      </a>

      <nav class="hidden items-center gap-1 lg:flex">
        @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary-50 text-primary-700"
          class="rounded-full px-4 py-2 text-sm font-semibold text-slate-700 transition-all hover:bg-primary-50 hover:text-primary-700">
          {{ item.label }}
        </a>
        }
      </nav>

      <div class="flex items-center gap-2 sm:gap-4">
        <div class="hidden items-center gap-1 sm:flex">
          <button
            type="button"
            (click)="changeLanguage('fr')"
            [class.text-primary-600]="currentLanguage() === 'fr'"
            [class.text-slate-500]="currentLanguage() !== 'fr'"
            class="px-2 py-1.5 text-sm font-bold transition-colors">
            FR
          </button>
          <span class="text-slate-300">/</span>
          <button
            type="button"
            (click)="changeLanguage('en')"
            [class.text-primary-600]="currentLanguage() === 'en'"
            [class.text-slate-500]="currentLanguage() !== 'en'"
            class="px-2 py-1.5 text-sm font-bold transition-colors">
            EN
          </button>
        </div>

        <ui-dropdown />

        <button
          type="button"
          (click)="toggleMobileMenu()"
          class="rounded-lg p-2.5 text-slate-600 transition-colors hover:bg-slate-100 lg:hidden"
          aria-label="Toggle navigation">
          <span class="block h-0.5 w-6 bg-current"></span>
          <span class="mt-1.5 block h-0.5 w-6 bg-current"></span>
          <span class="mt-1.5 block h-0.5 w-6 bg-current"></span>
        </button>
      </div>
    </div>

    @if (isMobileMenuOpen()) {
    <div class="border-t border-slate-200 py-2 lg:hidden">
      <nav class="flex flex-col gap-1">
        @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          (click)="closeMobileMenu()"
          routerLinkActive="bg-primary-50 text-primary-700"
          class="rounded-lg px-4 py-2.5 text-sm font-semibold text-slate-700 transition-all hover:bg-primary-50 hover:text-primary-700">
          {{ item.label }}
        </a>
        }
        <div class="mt-2 border-t border-slate-200 pt-2">
          <ui-dropdown />
        </div>
      </nav>
    </div>
    }
  </div>
</header>
